<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDD9FF"/>
      <stop offset="60%" style="stop-color:#FAF5FF"/>
      <stop offset="100%" style="stop-color:#F3E8FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(124,58,237,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="590" width="1200" height="4" fill="url(#accent)" opacity="0.3"/>

  <!-- Logo mark -->
  <rect x="80" y="60" width="72" height="72" rx="16" fill="url(#accent)"/>
  <text x="116" y="108" font-family="-apple-system,system-ui,sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="white" letter-spacing="-1">EM</text>

  <!-- Brand name -->
  <text x="172" y="93" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="900" fill="#1A0033" letter-spacing="-0.5">Eric Gomes &amp; Marcelo Caricati</text>
  <text x="172" y="118" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="400" fill="#5B3F80" letter-spacing="0.5">MARKETING DIGITAL</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="-apple-system,system-ui,sans-serif" font-size="68" font-weight="900" fill="#1A0033" letter-spacing="-2">Maximizando</text>
  <text x="80" y="350" font-family="-apple-system,system-ui,sans-serif" font-size="68" font-weight="900" letter-spacing="-2">
    <tspan fill="#7C3AED">ROI</tspan>
    <tspan fill="#1A0033"> com Marketing</tspan>
  </text>
  <text x="80" y="430" font-family="-apple-system,system-ui,sans-serif" font-size="68" font-weight="900" fill="#1A0033" letter-spacing="-2">Digital</text>

  <!-- Sub text -->
  <text x="80" y="500" font-family="-apple-system,system-ui,sans-serif" font-size="24" fill="#5B3F80" letter-spacing="0">SEO · Tráfego Pago · Performance · Desde 2013</text>

  <!-- Right side: people -->
  <!-- Eric card -->
  <rect x="820" y="160" width="320" height="140" rx="16" fill="white" opacity="0.7"/>
  <rect x="820" y="160" width="4" height="140" rx="2" fill="#7C3AED"/>
  <text x="844" y="200" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="1">CO-FUNDADOR · SEO &amp; DADOS</text>
  <text x="844" y="228" font-family="-apple-system,system-ui,sans-serif" font-size="26" font-weight="900" fill="#1A0033" letter-spacing="-0.5">Eric Gomes</text>
  <text x="844" y="256" font-family="-apple-system,system-ui,sans-serif" font-size="14" fill="#5B3F80">PUC-SP · SEO Técnico · GTM · APIs</text>
  <text x="844" y="280" font-family="-apple-system,system-ui,sans-serif" font-size="14" fill="#5B3F80">RD Station · Looker Studio</text>

  <!-- Marcelo card -->
  <rect x="820" y="330" width="320" height="140" rx="16" fill="white" opacity="0.7"/>
  <rect x="820" y="330" width="4" height="140" rx="2" fill="#9333EA"/>
  <text x="844" y="370" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="700" fill="#9333EA" letter-spacing="1">CO-FUNDADOR · TRÁFEGO PAGO</text>
  <text x="844" y="398" font-family="-apple-system,system-ui,sans-serif" font-size="26" font-weight="900" fill="#1A0033" letter-spacing="-0.5">Marcelo Caricati</text>
  <text x="844" y="426" font-family="-apple-system,system-ui,sans-serif" font-size="14" fill="#5B3F80">MBA Marketing · Google Ads Premier</text>
  <text x="844" y="450" font-family="-apple-system,system-ui,sans-serif" font-size="14" fill="#5B3F80">Performance · Looker Studio</text>

  <!-- Stats -->
  <rect x="80" y="548" width="180" height="60" rx="10" fill="rgba(124,58,237,0.08)"/>
  <text x="170" y="572" font-family="-apple-system,system-ui,sans-serif" font-size="28" font-weight="900" fill="#7C3AED" text-anchor="middle">300+</text>
  <text x="170" y="594" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#5B3F80" text-anchor="middle">Clientes atendidos</text>

  <rect x="280" y="548" width="180" height="60" rx="10" fill="rgba(124,58,237,0.08)"/>
  <text x="370" y="572" font-family="-apple-system,system-ui,sans-serif" font-size="28" font-weight="900" fill="#7C3AED" text-anchor="middle">15+</text>
  <text x="370" y="594" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#5B3F80" text-anchor="middle">Anos de experiência</text>

  <rect x="480" y="548" width="180" height="60" rx="10" fill="rgba(124,58,237,0.08)"/>
  <text x="570" y="572" font-family="-apple-system,system-ui,sans-serif" font-size="28" font-weight="900" fill="#7C3AED" text-anchor="middle">2013</text>
  <text x="570" y="594" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#5B3F80" text-anchor="middle">Fundação da agência</text>

  <!-- URL -->
  <text x="1180" y="615" font-family="-apple-system,system-ui,sans-serif" font-size="14" fill="#A88CC0" text-anchor="end">agenciademarketingdigital.com.br</text>
</svg>
